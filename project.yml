name: WakeUpFit
options:
  bundleIdPrefix: com.wakeupfit
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
targets:
  WakeUpFit:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: WakeUpFit
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wakeupfit.app
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "WakeUpFit needs camera access to track your workout exercises and count reps."
